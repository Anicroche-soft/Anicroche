<!DOCTYPE html>
<html lang="fr">
<head>
    <title>sans.js</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="/systeme/images/favicon.svg" type="image/svg+xml">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --c-theme:    #FFF;
            --c-creme:    oklch(0.95 0.01 30);
            --c-boue:     oklch(0.25 0.01 30);
            --c-sombre:   oklch(0.45 0.2 30);
            --c-vif:      oklch(0.65 0.2 30);
            --c-clair:    oklch(0.85 0.2 30);
            --c-analogue: var(--c-creme);
            --c-inverse:  var(--c-boue);
            --c-plus:     var(--c-clair);
            --c-moins:    var(--c-sombre);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --c-theme:    #000;
                --c-analogue: var(--c-boue);
                --c-inverse:  var(--c-creme);
                --c-plus:     var(--c-sombre);
                --c-moins:    var(--c-clair);
            }
        }

        body {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            font-family: monospace;
            background: var(--c-theme);
            color: var(--c-inverse);
            min-height: 100vh;
            padding: 1rem;
        }

        h1 {
            font-size: 1rem;
            color: var(--c-moins);
            letter-spacing: 0.05em;
        }

        .champ {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        label {
            font-size: 0.75rem;
            color: var(--c-inverse);
        }

        .ligne {
            display: flex;
            gap: 0.5rem;
        }

        select, input, textarea {
            background: transparent;
            border: 0.125rem solid var(--c-vif);
            color: var(--c-inverse);
            font-family: monospace;
            font-size: 0.9rem;
            border-radius: 0.5rem;
            outline: none;
            padding: 0.375rem;
        }

        ::placeholder { color: var(--c-moins); opacity: 1; }

        select { cursor: pointer; }

        .ligne input[type="text"] { flex: 1; }

        textarea {
            width: 100%;
            resize: vertical;
            min-height: 8rem;
            height: 16rem;
            line-height: 1.5;
        }

        .zone-copiable {
            position: relative;
        }

        .btn-copie {
            position: absolute;
            top: 0.25rem;
            right: 0.25rem;
            z-index: 1;
            width: auto;
            font-size: 0.75rem;
            border-radius: 0.25rem;
        }

        .btn-copie .texte-copier {
            visibility: visible;
        }

        .btn-copie .texte-copie {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: none;
        }

        .btn-copie.est-copie .texte-copier {
            visibility: hidden;
        }

        .btn-copie.est-copie .texte-copie {
            opacity: 1;
        }

        button {
            background: var(--c-vif);
            border: none;
            color: var(--c-creme);
            font-family: monospace;
            font-size: 1rem;
            line-height: 1;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: filter 0.15s;
            padding: 0.5em;
            width: min-content;
        }

        button:hover  { filter: brightness(1.15); }
        button:active { filter: brightness(0.85); }

        #reponse {
            display: none;
            flex-direction: column;
            gap: 0.25rem;
        }

        #reponse .statut {
            color: var(--c-inverse);
        }

        #corps-reponse {
            background: transparent;
            border: 0.125rem solid var(--c-vif);
            border-radius: 0.5rem;
            white-space: pre;
            overflow-x: auto;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--c-inverse);
            padding: 0.375rem;
        }
    </style>
</head>
<body>

    <h1>sans.js — console</h1>

    <div class="champ">
        <label>Requête</label>
        <div class="ligne">
            <select id="methode">
                <option>GET</option>
                <option selected>POST</option>
                <option>PATCH</option>
                <option>DELETE</option>
            </select>
            <input id="chemin" type="text" placeholder="/route" value="/">
        </div>
    </div>

    <div class="champ">
        <label>Corps</label>
        <div class="zone-copiable">
            <button id="btn-copie-corps" class="btn-copie" type="button">
                <span class="texte-copier">Copier</span>
                <span class="texte-copie">Copié</span>
            </button>
            <textarea id="corps" placeholder="{}" spellcheck="false"></textarea>
        </div>
    </div>

    <button id="btn">Envoyer</button>

    <div id="reponse">
        <p class="statut">Réponse — <span id="statut-code"></span></p>
        <div class="zone-copiable">
            <button id="btn-copie-reponse" class="btn-copie" type="button">
                <span class="texte-copier">Copier</span>
                <span class="texte-copie">Copié</span>
            </button>
            <pre id="corps-reponse"></pre>
        </div>
    </div>

    <script>
        // Parse un corps en syntaxe JS souple :
        //   - clefs sans guillemets          : { name: "Jo" }
        //   - valeurs avec "", '', `` ou rien : { city: Paris }
        //   - virgules optionnelles si saut de ligne entre les propriétés
        function parseSouple(texte) {
            texte = texte.trim()
            if (!texte) return null

            // Essai JSON strict en premier
            try { return JSON.parse(texte) } catch (_) {}

            let s = texte

            // 1. Ajouter les virgules manquantes entre les propriétés séparées par un saut de ligne
            //    Ex :   "foo"\n  bar:  →  "foo",\n  bar:
            s = s.replace(/([^\s,{\[])[ \t]*(\r?\n)([ \t]*(?=[^\s\]}]))/g, '$1,$2$3')

            // 2. Mettre entre guillemets les valeurs brutes non déjà quotées/structurées
            //    Ex :  city: Paris  →  city: "Paris"
            //          mail: a@a.a  →  mail: "a@a.a"
            //          active: true →  inchangé   |   age: 42 → inchangé
            s = s.replace(/(:\s*)([^"'`{\[,\n\r\]}\s][^,\n\r\]}]*)([ \t]*)(?=[,\n\r\]}]|$)/gm, (m, col, val, ws) => {
                const v = val.trim()
                if (/^-?\d+(\.\d+)?([eE][+-]?\d+)?$/.test(v)) return m   // nombre
                if (/^(true|false|null|undefined)$/.test(v)) return m      // mot-clé JS
                return col + '"' + v.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"' + ws
            })

            // 3. Évaluation comme littéral JS : gère les clefs non quotées, '', ``, etc.
            return (new Function('return (' + s + ')'))()
        }

        async function copierTexte(texte) {
            if (!texte) return
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(texte)
                return
            }

            const tmp = document.createElement('textarea')
            tmp.value = texte
            tmp.style.position = 'fixed'
            tmp.style.opacity = '0'
            document.body.appendChild(tmp)
            tmp.focus()
            tmp.select()
            document.execCommand('copy')
            document.body.removeChild(tmp)
        }

        function brancherBoutonCopie(idBouton, lireTexte) {
            const btn = document.getElementById(idBouton)
            let timer = null

            btn.addEventListener('click', async () => {
                try {
                    await copierTexte(lireTexte())
                    btn.classList.add('est-copie')
                    clearTimeout(timer)
                    timer = setTimeout(() => {
                        btn.classList.remove('est-copie')
                    }, 1000)
                } catch (_) {
                    btn.classList.remove('est-copie')
                }
            })
        }

        document.getElementById('btn').addEventListener('click', async () => {
            const methode = document.getElementById('methode').value
            const chemin  = document.getElementById('chemin').value.trim() || '/'
            const corps   = document.getElementById('corps').value.trim()

            const zone_reponse = document.getElementById('reponse')
            const statut_code  = document.getElementById('statut-code')
            const corps_rep    = document.getElementById('corps-reponse')

            const options = { method: methode, headers: {} }
            if (corps && methode !== 'GET') {
                let corpsJson
                try {
                    corpsJson = JSON.stringify(parseSouple(corps))
                } catch (e) {
                    statut_code.textContent = 'Erreur de syntaxe'
                    statut_code.className   = 'err'
                    corps_rep.textContent   = e.message
                    zone_reponse.style.display = 'flex'
                    return
                }
                options.headers['Content-Type'] = 'application/json'
                options.body = corpsJson
            }

            try {
                const rep   = await fetch(chemin, options)
                const texte = await rep.text()

                let affichage
                try { affichage = JSON.stringify(JSON.parse(texte), null, 2) }
                catch { affichage = texte }

                statut_code.textContent = rep.status + ' ' + rep.statusText
                statut_code.className   = rep.ok ? 'ok' : 'err'
                corps_rep.textContent   = affichage
            } catch (err) {
                statut_code.textContent = 'Erreur réseau'
                statut_code.className   = 'err'
                corps_rep.textContent   = err.message
            }

            zone_reponse.style.display = 'flex'
        })

        document.getElementById('chemin').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('btn').click()
        })

        brancherBoutonCopie('btn-copie-corps', () => document.getElementById('corps').value)
        brancherBoutonCopie('btn-copie-reponse', () => document.getElementById('corps-reponse').textContent)
    </script>

</body>
</html>
